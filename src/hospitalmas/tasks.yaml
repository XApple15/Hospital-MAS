extract_symptoms_task:
  description: >
    Read the raw user clinical message: "{user_message}".
    Extract ONLY symptoms explicitly present in the text.
    Do not infer diagnoses or add symptoms that are not stated.

    ╔══════════════════════════════════════════════════════════════════╗
    ║  MOST IMPORTANT INSTRUCTION — READ THIS FIRST:                 ║
    ║                                                                 ║
    ║  The "name" field MUST be the SHORTEST canonical medical term.  ║
    ║  Think: "What would the SYMP ontology call this symptom?"      ║
    ║  Ontology labels are 1-3 word base terms like:                 ║
    ║    rash, joint pain, fever, cough, headache, fatigue, nausea   ║
    ║                                                                 ║
    ║  ALL modifiers go into separate fields (notes/location/etc).   ║
    ║  If "name" is longer than 3 words → it is almost certainly WRONG║
    ╚══════════════════════════════════════════════════════════════════╝

    ── BANNED WORDS IN "name" FIELD (move to "notes") ────────────────
    persistent, severe, mild, chronic, acute, intense, moderate,
    worsening, recurrent, intermittent, constant, significant,
    debilitating, extreme, excessive, noticeable, marked, notable,
    red, swollen, widespread, spotted, dark, sharp, throbbing,
    crampy, dry, productive, concentrated, deep, dull

    ── BANNED PATTERNS IN "name" FIELD ───────────────────────────────
    "... with ..."         → strip "with ..." to notes
    "... in <body part>"   → strip to location
    "... on <body part>"   → strip to location
    "... reaching/peaking" → strip to notes
    "... that ..."         → strip clause to notes
    "skin rash"            → use just "rash"

    ── REQUIRED MAPPINGS (use the RIGHT side as "name") ──────────────
    "skin rash with red spots"   → "rash"
    "persistent joint pain"      → "joint pain"
    "severe headache"            → "headache"
    "dry persistent cough"       → "cough"
    "sharp abdominal pain"       → "abdominal pain"
    "dark concentrated urine"    → "dark urine"
    "significant weight loss"    → "weight loss"
    "excessive sweating"         → "sweating"
    "widespread skin rash"       → "rash"
    "swollen lymph nodes in neck"→ "swollen lymph nodes"

    These are ALWAYS valid as-is (do not simplify further):
    "loss of appetite", "swollen lymph nodes", "high fever",
    "blurred and distorted vision", "dark urine", "chest pain",
    "joint pain", "muscle pain", "back pain", "belly pain",
    "red spots over body", "yellowish skin", "yellowing of eyes",
    "mood swings", "fast heart rate", "muscle weakness",
    "skin peeling", "spinning movements", "loss of balance",
    "passage of gases", "internal itching", "burning micturition"

    ── COMPOUND SPLITTING ────────────────────────────────────────────
    "nausea and vomiting" → two entries: "nausea" + "vomiting"
    "fever and chills"    → two entries: "fever" + "chills"

    ── MANDATORY SELF-CHECK (before output) ──────────────────────────
    For EVERY symptom in your output, verify:
      1. Is "name" > 3 words? → WRONG. Simplify.
      2. Does "name" contain any BANNED word above? → WRONG. Move it to notes.
      3. Does "name" contain a body part not integral to the base term? → WRONG. Move to location.
      4. Would this exact "name" be an rdfs:label in SYMP ontology? → If no, use shorter form.
    Fix ALL violations before returning output.
  expected_output: >
    A JSON object with key "symptoms" containing a list of symptom objects.
    Each object must have a "name" key (string) containing ONLY the core
    medical/ontology term — 1-3 words, no adjectives, no locations, no descriptions.
    Optional keys: "duration", "location", "onset", "notes".
    The "notes" field captures severity, appearance, and qualifiers stripped from name.
    All values must come from the user message only.

    FINAL VALIDATION: Before outputting, verify that NO "name" field contains
    any BANNED adjective (persistent, severe, mild, red, dark, sharp, etc.),
    any body location, or any descriptive phrase. If name > 3 words, it is wrong.
  agent: symptom_extractor

map_symptoms_to_symp_task:
  description: >
    You will receive a list of symptoms from the extract_symptoms_task output.

    CRITICAL TOOL CONTRACT:
    graphdb_ontology_query only executes the exact sparql_query you send.
    It does not determine intent or compose query logic for you.
    You must decide what to query and build the query.
    Use the graphdb_ontology_query tool description as the source of
    query-construction guidance.

    Process ALL symptoms in a single pass. For each symptom:

    Step 1 - Search query authoring:
    Build a read-only ontology lookup query that searches SYMP entities by
    symptom label text using case-insensitive matching. Ensure the query
    returns both term URI and label so you can choose the best candidate.

    Step 2 - Retrieve ontology results:
    Call graphdb_ontology_query directly with a read-only label-search SPARQL
    query for each symptom.
    Read candidate URIs, labels, and parsed IDs from tool output.

    Step 3 - Select best candidate by semantic label relevance.
    If no relevant candidate is found, proceed to Step 4.

    Step 4 - Retry with PROGRESSIVE SIMPLIFICATION (mandatory before unmapped):

    ★★★ RETRY STRATEGY — FOLLOW IN ORDER ★★★

    Retry A — Drop qualifiers: If the symptom name still contains adjectives
    or modifiers, strip them and search again.
      "persistent joint pain" → search "joint pain"
      "severe headache" → search "headache"
      "skin rash" → search "rash"
      "dark concentrated urine" → search "dark urine", then "urine"
      "burning micturition" → search "micturition", then "dysuria"

    Retry B — Try the root/base term only:
      "joint pain" → search "pain" (if "joint pain" returned nothing)
      "muscle weakness" → search "weakness"
      "swollen lymph nodes" → search "lymph" or "lymphadenopathy"
      "chest tightness" → search "chest" or "tightness"

    Retry C — Try a clinical synonym:
      "loss of appetite" ↔ "anorexia"
      "swollen lymph nodes" ↔ "lymphadenopathy"
      "shortness of breath" ↔ "dyspnea"
      "belly pain" ↔ "abdominal pain"
      "red spots" ↔ "rash" or "exanthem"
      "itching" ↔ "pruritus"
      "yellowish skin" ↔ "jaundice"
      "spinning movements" ↔ "vertigo"
      "tiredness" ↔ "fatigue"
      "stomach bleeding" ↔ "gastrointestinal hemorrhage" or "hematemesis"
      "unresponsiveness" ↔ "unconsciousness" or "altered consciousness" or "coma"

    You MUST attempt at least 2 retries using different simplification or
    synonym strategies before proceeding to the HP ontology fallback.
 
    Retry D — HP Ontology Fallback (mandatory before marking unmapped):
    If Retries A, B, and C all failed to find a SYMP match, use the
    hp_ontology_query tool to search the Human Phenotype (HP) Ontology
    for the symptom term. The HP ontology uses different terminology and
    may recognize terms that SYMP does not directly index.
 
    Steps for Retry D:
      D1. Call hp_ontology_query with the original symptom name:
          {"search_term": "<symptom name>"}
 
      D2. Read the response. Look at the suggested_symp_search_terms list.
          These are HP ontology labels that describe the same or related
          phenotype using alternative terminology.
 
      D3. For EACH suggested term in suggested_symp_search_terms (try up to 3),
          call graphdb_ontology_query with a PATTERN 1 (label search) query
          using the HP-suggested label as the search text.
 
      D4. If any of these SYMP searches return a match, select the best
          candidate and use it as the mapping. You are done for this symptom.
 
      D5. If hp_ontology_query returned no suggestions, or none of the
          HP-suggested terms matched in SYMP either, THEN mark as unmapped.
 
    Example:
      - SYMP search "passage of gases" → no results
      - Retry A/B/C: "gases", "gas", "flatulence" → still nothing in SYMP
      - hp_ontology_query({"search_term": "passage of gases"})
        → suggested_symp_search_terms: ["flatulence", "increased flatus"]
      - SYMP search "flatulence" → FOUND SYMP match! Use it.
 
    Example:
      - SYMP search "spinning movements" → no results
      - Retry A/B/C: "spinning", "vertigo", "dizziness" → still nothing
      - hp_ontology_query({"search_term": "spinning movements"})
        → suggested_symp_search_terms: ["vertigo", "dizziness"]
      - SYMP search "vertigo" → FOUND! Use it.
 
    CRITICAL RULES for Retry D:
    - HP URIs are NOT SYMP URIs. NEVER use an HP URI as the matched_symp_uri.
    - Use HP labels ONLY as alternative search terms for SYMP lookups.
    - The final matched_symp_uri, matched_symp_label, and parsed_symp_number
      MUST come from a graphdb_ontology_query (SYMP) response, not from HP.
    - You MUST attempt Retry D before marking any symptom as unmapped.
 

    Step 5 - Use parsed_symp_number from the selected candidate.
    If missing, parse only digits after SYMP_ from the selected URI.

    Step 6 - Repeat for the next symptom until all are processed.

    ABSOLUTE RULES:
    - You MUST use tool-backed ontology evidence for every symptom.
    - matched_symp_uri and matched_symp_label MUST come from tool responses only.
    - NEVER invent, guess, or assume any SYMP URI, label, or numeric ID.
    - If tools return no results after all retries, set status "unmapped" and
      set matched_symp_uri, matched_symp_label, parsed_symp_number all to null.
    - An unmapped result with null values is always correct over any fabrication.

    STRICT ontology access rules:
    - Call graphdb_ontology_query with a flat object:
      {"sparql_query": "<full query string>"}
    - If tool fails, retry up to 2 times before unmapped.
  expected_output: >
    A JSON object with key "symp_mappings" containing a list of objects.
    Each object must have these keys:
      "symptom": the symptom name string from the input
      "matched_symp_uri": the full URI string returned by graphdb_ontology_query, or null if unmapped
      "matched_symp_label": the label string returned by graphdb_ontology_query, or null if unmapped
      "parsed_symp_number": the digits-only string extracted from the URI, or null if unmapped
      "status": either "mapped" or "unmapped"
      "notes": empty string on success, brief failure reason on unmapped

    All non-null values in matched_symp_uri, matched_symp_label, and
    parsed_symp_number MUST come directly from tool responses.
    Do not invent or reuse any URI, label, or number from examples or memory.
  agent: symp_mapper

query_diseases_for_symptoms_task:
  description: >
    You will receive the symp_mappings list from the map_symptoms_to_symp_task output.

    ★★★ PREFERRED APPROACH: USE batch_disease_query TOOL ★★★

    Collect ALL mapped symptom URIs (where status is "mapped" and
    matched_symp_uri is not null) into a single list, then call
    batch_disease_query ONCE with all URIs:

    {"symptom_uris": ["http://purl.obolibrary.org/obo/SYMP_0000064", ...]}

    The tool returns results grouped by symptom URI. For each URI in the
    response, copy disease_candidates and disease_entries verbatim.

    For any symptom with status "unmapped" or null parsed_symp_number,
    record it with disease_candidates set to [] and status "skipped".

    FALLBACK: If batch_disease_query fails, fall back to calling
    graphdb_ontology_query individually per symptom using PATTERN 3
    from the tool description.

    ABSOLUTE RULES:
    - disease_candidates must contain ONLY strings from the tool response.
    - disease_entries must contain ONLY URI/label pairs from tool response rows.
    - NEVER invent, guess, infer, or paraphrase any disease name.
    - NEVER use symptom names as disease names.
    - NEVER copy disease names from examples, instructions, or memory.
    - If the tool returns an empty "disease_candidates" array, record []
      and set status "no_diseases". This is a correct and valid result.
    - If tool call fails, retry up to 2 times.
      After 2 failures record [] and status "tool_failure". Never fabricate.
    - An empty disease_candidates list is always correct over any fabrication.

    Process ALL entries before returning. Do not stop early.
  expected_output: >
    A JSON object with key "disease_results" containing a list of objects.
    Each object must have these keys:
      "symptom": the symptom name string from the mapping
      "symp_uri": the matched_symp_uri from the mapping, or null if skipped
      "parsed_symp_number": the parsed_symp_number from the mapping, or null if skipped
      "disease_candidates": list of disease label strings from tool response,
                            or empty list [] if no diseases found, tool failed, or skipped
      "disease_entries": list of objects with keys:
             "disease_uri": full disease URI string from tool response, or null
             "disease_label": disease label string from tool response, or null
      "status": one of "success", "no_diseases", "tool_failure", "skipped"
      "notes": empty string on success, brief description of outcome otherwise

    CRITICAL: every string in disease_candidates must be copied verbatim from
    the tool response. Do not write any disease name from memory or inference.
    Every disease_entries object must be copied from response rows only.
  agent: disease_mapper

clarify_followup_symptoms_task:
  description: >
    You will receive disease_results from the query_diseases_for_symptoms_task.

    NOTE: Ranking is computed deterministically by the pipeline in Python code.
    You do NOT need to compute scores. Instead, use the disease_results to identify
    the top candidate diseases — these are the diseases that appear in the MOST
    symptom candidate lists (highest co-occurrence count across disease_results).

    CRITICAL TOOL CONTRACT:
    graphdb_ontology_query is only an execution layer.
    It executes the exact sparql_query string you send and nothing else.
    You must decide what data is needed and author the query accordingly.
    Use the graphdb_ontology_query tool description to construct valid queries.

    ── TRIGGER RULE ──────────────────────────────────────────────────────────
    Count total unique diseases across all disease_candidates lists.
    If total unique diseases <= 1:
      Set followup_needed = false. Return empty disease_symptom_profiles and
      questions_asked arrays immediately. Do not call any tools.
    If total unique diseases > 1:
      Follow-up is MANDATORY. Continue with the steps below.
    ──────────────────────────────────────────────────────────────────────────

    Step 1 - Select candidate diseases for profiling.
      Count how many different symptom entries each disease appears in across
      disease_results. Select the top 5 diseases by this co-occurrence count.
      Break ties alphabetically.

    Step 2 - Fetch symptom profiles.
      For each candidate disease, locate its disease_uri in disease_entries
      (from disease_results). If no URI is available, mark it skipped_for_followup.
      For every disease with a URI:
      a) Copy PATTERN 2 (disease-to-symptom) from graphdb_ontology_query tool description.
      b) Replace <disease_uri> with the actual disease URI.
      c) Execute it using graphdb_ontology_query with {"sparql_query": "<full query string>"}.
      d) Do NOT add FILTER(LANG(...)) or any other filters to the pattern.
      e) Collect the returned symptom labels into that disease's candidate_symptoms list.
      f) Use tool output only; never fabricate symptom labels.

    Step 3 - Build a global discriminative symptom pool.
      Collect every symptom label across all profiled diseases into one pool.
      Then apply these filters IN ORDER:
        a) Remove symptoms already present in the initial patient message
           (case-insensitive match against the original extracted symptom names).
        b) Remove symptoms that appear in ALL candidate disease profiles
           (they cannot discriminate between diseases).
        c) Score each remaining symptom by discriminative power:
             score = (number of candidate diseases that do NOT list this symptom)
             Higher score = more exclusive to fewer diseases = more discriminative.

    Step 4 - Select questions.
      Select an adaptive number of symptoms from highest discriminative score,
      asking as few questions as possible while still separating top diagnoses.
      Maximum allowed patient questions: 22.

      ★★★ MANDATORY CLASSIFICATION BEFORE ASKING ★★★
      STEP A: Classify each selected symptom.
      Apply REASONING (not hardcoded lists) to classify each selected symptom as EITHER:
      - investigation_required, OR
      - patient_reportable

      INVESTIGATION_REQUIRED classification rule:
      Apply these checks IN ORDER. If ANY apply, classify as investigation_required:
      1. Does it require specialized equipment to detect? (BP cuff, oximeter, ECG, lab machine, imaging)
      2. Is it a measurement/lab value? (e.g., "120/80 mmHg", "glucose 95 mg/dL", "WBC 5K")
      3. Is it a biomarker or lab finding? (enzymes, counts, levels, CRP, liver function tests)
      4. Is it an imaging/radiology result? (X-ray/CT/MRI/ultrasound findings)
      5. Does it require professional clinical assessment? (heart murmurs detected by stethoscope,
         retinal findings, some skin signs requiring magnification)
      6. Does the symptom name contain measurement keywords? (pressure, saturation, heart rate,
         count, enzyme, level, finding, imaging, ECG, EKG, result, test)
      7. Is it an internal organ condition? (e.g., "liver inflammation", "hepatomegaly",
         "splenomegaly", "pleural effusion") — these require imaging or labs to confirm.

      PATIENT_REPORTABLE classification rule:
      Apply these checks. If ANY apply, classify as patient_reportable:
      1. Patient directly feels/experiences it? (fever/feeling hot, cough/coughing, pain/hurt,
         nausea/feeling sick, dizziness/feeling faint, fatigue/tiredness)
      2. Patient can directly observe it? (bleeding they see, rash/spots they see, swelling they feel)
      3. Patient can describe it without equipment? (Yes = patient_reportable)
      4. It's a subjective symptom or patient-observable sign? (Yes = patient_reportable)

      ★★★ MANDATORY SEPARATION STEP ★★★
      STEP B: Create TWO SEPARATE LISTS after classification:
      List_A = all symptoms classified as investigation_required
      List_B = all symptoms classified as patient_reportable

      THEN:
      - Add ALL items from List_A to investigations_required with a reason
      - Use ONLY List_B to generate patient questions
      - NEVER generate a question for anything in List_A

      ★★★ MANDATORY FILTERING RULE ★★★
      - investigation_required items DO NOT become patient questions.
      - investigation_required items MUST be added to investigations_required list with a brief reason.
      - Only patient_reportable items may become yes/no questions.
      - If a symptom appears in questions_asked, it MUST be verified as in List_B (patient_reportable).
      - AUDIT: No symptom should appear in BOTH questions_asked AND investigations_required.

      For patient_reportable items ONLY (from List_B), create yes/no questions:
      For each selected symptom in List_B, emit exactly one yes/no question using this
      conditional style:
      - If the symptom is a common everyday term (e.g., fever, cough, headache),
        ask directly: "Do you have <symptom>?"
      - Treat these as common everyday terms and ask directly with no
        parentheses: fever, cough, headache, bleeding, vomiting, diarrhea,
        chest pain, sore throat, muscle pain, joint pain.
      - If the symptom is a medical/technical term (e.g., rash, dysuria,
        dyspnea), ask with a plain explanation plus the term in parentheses:
        "Do you have <simple explanation> (<medical term>)?"
        Example: "Do you have red spots on the skin (rash)?"
      
      If needed for grammar, a close equivalent is allowed, but it MUST remain
      a single yes/no question about exactly one symptom.
      Keep each question short (max 14 words), patient-friendly, and avoid
      medical jargon unless it is part of the symptom label.
      Do not ask severity, duration, or cause in the same question.
      IMPORTANT language policy:
      - Use easy, non-technical wording so any patient can understand.
      - Include parentheses only when the symptom label is medical/technical.
      - Common everyday symptom names should NOT be rewritten with parentheses.
      - Example common: "Do you have fever?"
      - Example common: "Do you have bleeding?"
      - Example medical: "Do you have yellow skin or eyes (jaundice)?"
      - The wording before parentheses MUST explain the symptom in plain words,
        not repeat the same medical label.
      - FORBIDDEN example: "Do you have rash (rash)?"
      - FORBIDDEN example: "Do you have bleeding (bleeding)?"
      - CORRECT example: "Do you have red or itchy skin spots (rash)?"
      Global deduplication: never emit the same symptom question twice.
      Skip any symptom that already has a non-empty patient_answer in the
      input context.

    ABSOLUTE RULES:
    - Call graphdb_ontology_query ONLY with SPARQL queries built from URIs in disease_entries.
    - Never invent disease URIs, symptom URIs, or symptom labels.
    - Never ask about a symptom the patient already confirmed.
    ★★★ CRITICAL: Copy SPARQL patterns EXACTLY from graphdb_ontology_query tool description.
    ★★★ CRITICAL: Do NOT add FILTER(LANG(...)) or any filters NOT shown in the patterns.
    ★★★ CRITICAL: Deviating from patterns = zero results = failed queries. Follow patterns exactly.
    ★★★ CRITICAL: Use reasoning—not hardcoded lists—to classify each symptom as investigation_required or patient_reportable.
    ★★★ CRITICAL: Create TWO SEPARATE LISTS after classification (investigation_required and patient_reportable).
    ★★★ CRITICAL: investigation_required symptoms MUST NOT appear in questions_asked under ANY circumstance.
    ★★★ CRITICAL: Do NOT ask about hypotension, shock, thrombocytopenia, liver inflammation, or ANY investigation_required finding.
    ★★★ CRITICAL: AUDIT your output: if any symptom appears in BOTH questions_asked and investigations_required, the output is WRONG.
    - Any symptom requiring equipment/measurement/labs/imaging to detect MUST be investigation_required.
    - Any symptom the patient can directly experience or observe without equipment is patient_reportable.
    - If uncertain about a symptom's nature, apply the classification rules above; do not guess.
    - Never produce or suggest a final diagnosis in this step.
    - questions_asked must contain no duplicate symptom entries.
    - Each question in questions_asked must end with "?" and be answerable by yes/no only.
    - Each question must reference exactly one symptom from candidate_symptoms.
    - For medical/technical symptoms, include the medical term in parentheses.
    - For common symptoms, do not add parentheses unless needed for clarity.
    - Never output "<term> (<term>)" for any symptom.
    - Every symptom in questions_asked must be verified as patient_reportable (not investigation_required).
  expected_output: >
    A JSON object with keys:
      "followup_needed": boolean — true only when total unique diseases > 1
      "disease_symptom_profiles": list of objects, one per candidate disease:
        "disease": disease label string (from disease_results)
        "disease_uri": disease URI string from disease_entries, or null
        "candidate_symptoms": list of symptom label strings from graphdb_ontology_query tool
        "status": one of "profiled" | "skipped_for_followup" | "tool_failure"
      "questions_asked": list of question objects, max 22:
        "symptom": the symptom label string used to generate the question
        "question": the yes/no question text to present to the patient
        "patient_answer": null  ← always null at output time; filled externally
      "investigations_required": list of objects:
        "finding": symptom/finding label that should not be asked directly
        "reason": brief reason, e.g. "requires measurement or laboratory/imaging investigation"
      "notes": brief summary — number of diseases profiled, symptoms in pool,
               questions selected, and any skipped diseases
  agent: followup_interviewer

refine_diagnosis_task:
  description: >
    NOTE: Scoring has already been computed deterministically by the pipeline.
    The refined_differential_diagnosis with correct final_scores is provided.

    Your job is to review the computed results and provide clinical reasoning
    narrative for each disease explaining WHY it moved up or down.

    You will receive the initial differential_diagnosis and the completed
    questions_asked list with patient_answer fields filled in by the patient,
    both provided as JSON blocks appended below this description by the runtime.

    For each disease in the refined ranking:
    - Note its baseline composite_score from Phase 1
    - List which follow-up symptoms were confirmed (yes) or denied (no)
    - Explain the clinical significance of key confirmations/denials
    - Note how its rank changed from Phase 1

    Do NOT recompute any scores. The scores are correct as provided.
    Your output should focus on the clinical reasoning narrative only.

    ABSOLUTE RULES:
    - Only diseases present in initial differential_diagnosis may appear in output.
    - Never invent new diseases or symptoms.
    - Do NOT change any score values — they are computed correctly by the pipeline.
    - An unchanged ranking with an honest explanation is always correct.
  expected_output: >
    A JSON object with keys:
      "refined_differential_diagnosis": list of ranked disease objects:
        "rank": integer starting at 1
        "disease": disease label copied exactly from initial ranking
        "baseline_score": float — original composite_score from Phase 1
        "followup_support": float — sum of weighted confirmed symptom matches
        "followup_conflict": float — sum of weighted denied symptom matches
        "final_score": float — baseline + support - conflict
        "updated_confidence": "HIGH" | "MEDIUM" | "LOW"
        "reasoning": string — clinical evidence narrative for this disease
      "discriminative_weights": object mapping symptom → weight used
      "followup_summary": string — most impactful answer and overall effect on ranking
      "notes": string — caveats, e.g. neutral-only answers, ties, missing URIs
  agent: diagnosis_refiner