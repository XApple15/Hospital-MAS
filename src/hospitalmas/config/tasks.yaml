extract_symptoms_task:
  description: >
    Read the raw user clinical message: "{user_message}".
    Extract ONLY symptoms explicitly present in the text.
    Do not infer diagnoses or add symptoms that are not stated.
    Include optional qualifiers when explicitly present (duration, location, onset).
    Return a clean symptom list ready for ontology matching.
  expected_output: >
    A JSON object with key "symptoms" containing a list of symptom objects.
    Each object must have a "name" key (string).
    Optional keys "duration", "location", "onset" must only be present
    if explicitly stated in the user message. Omit them otherwise.
    All values must come from the user message only.
  agent: symptom_extractor

map_symptoms_to_symp_task:
  description: >
    You will receive a list of symptoms from the extract_symptoms_task output.
    Process ALL symptoms in a single pass. For each symptom:

    Step 1 - Search query authoring:
    Build a read-only SPARQL SELECT query yourself to search SYMP labels by the symptom text.
    Use this query shape (you may format whitespace freely):
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?symptom ?symptomLabel
      WHERE {
        ?symptom rdfs:label ?symptomLabel .
        FILTER(CONTAINS(LCASE(STR(?symptomLabel)), "<lowercased symptom text>"))
      }

    Step 2 - Execute:
    Call graphdb_symp_search with:
      {"sparql_query": "<full query string>"}
    Read candidate URIs, labels, and parsed IDs from the tool response.

    Step 3 - Select best candidate by semantic label relevance.
    If no relevant candidate is found, mark symptom as unmapped.

    Step 4 - Retry: If no match found, retry up to 2 times using a synonym or
    simplified version of the symptom text. If still no match, mark unmapped.

    Step 5 - Use parsed_symp_number from the selected candidate.
    If missing, parse only digits after SYMP_ from the selected URI.

    Step 6 - Repeat for the next symptom until all are processed.

    ABSOLUTE RULES:
    - You MUST call graphdb_symp_search for every symptom. Never skip tool calls.
    - matched_symp_uri and matched_symp_label MUST come from tool responses only.
    - NEVER invent, guess, or assume any SYMP URI, label, or numeric ID.
    - If tools return no results after all retries, set status "unmapped" and
      set matched_symp_uri, matched_symp_label, parsed_symp_number all to null.
    - An unmapped result with null values is always correct over any fabrication.

    STRICT graphdb_symp_search call rules:
    - Action input must be exactly one flat object: {"sparql_query": "<full query string>"}
    - Do not include extra keys.
    - If a call fails, retry up to 2 times after fixing your SPARQL query.
  expected_output: >
    A JSON object with key "symp_mappings" containing a list of objects.
    Each object must have these keys:
      "symptom": the symptom name string from the input
      "matched_symp_uri": the full URI string returned by graphdb_symp_search, or null if unmapped
      "matched_symp_label": the label string returned by graphdb_symp_search, or null if unmapped
      "parsed_symp_number": the digits-only string extracted from the URI, or null if unmapped
      "status": either "mapped" or "unmapped"
      "notes": empty string on success, brief failure reason on unmapped

    All non-null values in matched_symp_uri, matched_symp_label, and
    parsed_symp_number MUST come directly from tool responses.
    Do not invent or reuse any URI, label, or number from examples or memory.
  agent: symp_mapper

query_diseases_for_symptoms_task:
  description: >
    You will receive the symp_mappings list from the map_symptoms_to_symp_task output.

    For each entry in symp_mappings, follow EXACTLY one of these two cases:

    CASE A - status is "unmapped" OR parsed_symp_number is null or empty:
      Do NOT call any tool.
      Record this entry with disease_candidates set to [] and status "skipped".

    CASE B - status is "mapped" AND parsed_symp_number is a non-empty digit string:
      You MUST construct a read-only SPARQL SELECT query yourself.
      Use the parsed_symp_number from the mapping as the SYMP term in the query.

      Required query shape (you may format whitespace freely):
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX ro: <http://purl.obolibrary.org/obo/RO_>
      PREFIX symp: <http://purl.obolibrary.org/obo/SYMP_>
      SELECT ?disease ?diseaseLabel
      WHERE {
        ?disease rdfs:subClassOf ?restriction .
        ?restriction owl:onProperty ro:0002452 .
        ?restriction owl:someValuesFrom symp:<parsed_symp_number> .
        ?disease rdfs:label ?diseaseLabel .
        FILTER(LANG(?diseaseLabel) = "en")
      }

      Then call graphdb_sparql_query.
      The tool takes ONE argument named exactly "sparql_query".
      The value must be your full SPARQL query string.
      The Action Input must be a flat JSON object with exactly one key:
        {"sparql_query": "<full query string>"}
      Do NOT wrap in an array. Do NOT add other keys. One flat object only.

      The tool returns a JSON string. Parse it and read the "disease_candidates"
      array from the result. Copy every string from that array verbatim into
      this entry's disease_candidates. Do not modify any string.

      Also parse "disease_rows" from the same tool response. For each row,
      copy disease URI and label exactly as returned into disease_entries.
      Prefer row.disease_uri if present, otherwise row.disease_iri.

    ABSOLUTE RULES:
    - disease_candidates must contain ONLY strings from the tool response.
    - disease_entries must contain ONLY URI/label pairs from tool response rows.
    - NEVER invent, guess, infer, or paraphrase any disease name.
    - NEVER use symptom names as disease names.
    - NEVER copy disease names from examples, instructions, or memory.
    - If the tool returns an empty "disease_candidates" array, record []
      and set status "no_diseases". This is a correct and valid result.
    - If the tool call fails, retry up to 2 times after fixing your SPARQL query.
      After 2 failures record [] and status "tool_failure". Never fabricate.
    - An empty disease_candidates list is always correct over any fabrication.

    Process ALL entries before returning. Do not stop early.
  expected_output: >
    A JSON object with key "disease_results" containing a list of objects.
    Each object must have these keys:
      "symptom": the symptom name string from the mapping
      "symp_uri": the matched_symp_uri from the mapping, or null if skipped
      "parsed_symp_number": the parsed_symp_number from the mapping, or null if skipped
      "disease_candidates": list of disease label strings from graphdb_sparql_query,
                            or empty list [] if no diseases found, tool failed, or skipped
      "disease_entries": list of objects with keys:
             "disease_uri": full disease URI string from tool response, or null
             "disease_label": disease label string from tool response, or null
      "status": one of "success", "no_diseases", "tool_failure", "skipped"
      "notes": empty string on success, brief description of outcome otherwise

    CRITICAL: every string in disease_candidates must be copied verbatim from
    the "disease_candidates" array in the graphdb_sparql_query response.
    Do not write any disease name from memory, examples, or inference.
    Every disease_entries object must be copied from response rows only.
  agent: disease_mapper

rank_diagnoses_task:
  description: >
    You will receive the disease_results list from the query_diseases_for_symptoms_task output.

    Step 1 - Build co-occurrence index:
    For each disease label in any disease_candidates list, count how many
    distinct symptoms it appears under. This is its co-occurrence score.

    Step 2 - Rank:
    Sort diseases highest to lowest score. Break ties alphabetically.

    Step 3 - Assign confidence tiers:HIGH   ,MEDIUM,LOW   

    Step 4 - For each ranked disease, list the symptoms that support it.

    Step 5 - Return the differential diagnosis report.

    ABSOLUTE RULES:
    - Only include diseases that appear in disease_results disease_candidates lists.
    - NEVER add diseases from your own medical knowledge or memory.
    - NEVER invent or infer any disease not present in the input data.
    - If all disease_candidates lists are empty, return an empty
      differential_diagnosis list and explain in notes. Do not fabricate.
    - An empty diagnosis is always correct over a fabricated one.

    If no disease appears under more than one symptom, return all with LOW
    confidence and note low specificity.
  expected_output: >
    A JSON object with these keys:
      "differential_diagnosis": list of ranked disease objects, each with:
        "rank": integer starting from 1
        "disease": disease label string copied exactly from disease_results
        "co_occurrence_score": integer count of symptoms the disease appeared under
        "confidence": "HIGH", "MEDIUM", or "LOW"
        "supporting_symptoms": list of symptom name strings from disease_results
      "total_symptoms_processed": integer count of all symptoms received
      "total_diseases_found": integer count of unique disease labels across all results
      "unmapped_symptoms": list of symptom name strings with status "unmapped" or "skipped"
      "notes": brief summary string

    differential_diagnosis may be an empty list if no tool returned any diseases.
    Every disease string must be copied verbatim from the disease_candidates in
    the input. Do not write any disease name from memory or inference.
  agent: diagnosis_ranker

clarify_followup_symptoms_task:
  description: >
    You will receive disease_results and differential_diagnosis from prior tasks.

    Trigger rule:
    - If total_diseases_found <= 1, do not ask follow-up questions.
      Return followup_needed=false and empty arrays.
    - If total_diseases_found > 1, follow-up is mandatory.

    For each disease candidate (use disease_entries to get disease_uri), call
    graphdb_disease_symptoms with:
      {"disease_uri": "<full disease URI>"}

    Build ONE global candidate symptom pool across all disease profiles, then
    select only discriminative symptoms for questioning.

    Discriminative symptom selection rules:
    - Exclude symptoms already present in the initial user message.
    - Exclude symptoms that appear in ALL candidate diseases.
    - Prefer symptoms that appear in only one or a few diseases.
    - Deduplicate by normalized symptom text (case-insensitive).

    Question generation rules:
    - Ask each symptom at most once globally (not once per disease).
    - If a question already has a non-empty patient_answer in the input context,
      do NOT ask it again.
    - If this task is re-run, only output unanswered questions.
    - Maximum 5 questions per run.
    - Keep questions concise and clinical, one symptom per question.

    Do not wait for answers in this task. Runtime asks sequentially.

    ABSOLUTE RULES:
    - Use graphdb_disease_symptoms only with disease URIs from disease_entries.
    - Never invent disease URIs or symptom labels.
    - If URI is missing for a disease, mark that disease as skipped_for_followup.
    - Do not produce final diagnosis in this step.
    - Never duplicate the same symptom question in questions_asked.
  expected_output: >
    A JSON object with keys:
      "followup_needed": boolean
      "disease_symptom_profiles": list of objects with:
        "disease": disease label
        "disease_uri": disease URI or null
        "candidate_symptoms": list of symptom label strings from tool output
        "status": "profiled" | "skipped_for_followup" | "tool_failure"
      "questions_asked": list of objects with:
        "disease": disease label
        "symptom": symptom label
        "question": exact question asked to patient
        "patient_answer": null
      "notes": brief summary
  agent: followup_interviewer

refine_diagnosis_task:
  description: >
    You will receive the initial differential_diagnosis and follow-up responses.

    Build an evidence adjustment per disease:
    - For each confirmed follow-up symptom, add positive support.
    - For each denied symptom, add negative support.
    - For uncertain/no answer, treat as neutral.

    Re-rank diseases using:
    1) original co_occurrence_score as baseline
    2) follow-up evidence adjustments
    3) deterministic tie-breaker alphabetically

    Then assign updated confidence tiers and explain evidence.

    ABSOLUTE RULES:
    - Only diseases present in initial differential_diagnosis may appear.
    - Do not invent new diseases.
    - Use follow-up answers as the only post-baseline evidence source.
  expected_output: >
    A JSON object with keys:
      "refined_differential_diagnosis": list of ranked objects with:
        "rank": integer starting at 1
        "disease": disease label from initial ranking
        "baseline_score": integer original co_occurrence_score
        "followup_support_count": integer
        "followup_conflict_count": integer
        "updated_confidence": "HIGH" | "MEDIUM" | "LOW"
        "reasoning": short evidence-based explanation
      "followup_summary": brief summary of how patient answers changed ranking
      "notes": brief final diagnostic caveats
  agent: diagnosis_refiner