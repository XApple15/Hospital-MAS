extract_symptoms_task:
  description: >
    Read the raw user clinical message: "{user_message}".
    Extract ONLY symptoms explicitly present in the text.
    Do not infer diagnoses or add symptoms that are not stated.
    Include optional qualifiers when explicitly present (duration, location, onset).
    Return a clean symptom list ready for ontology matching.
  expected_output: >
    A JSON object with key "symptoms" containing a list of symptom objects.
    Each object must have a "name" key (string).
    Optional keys "duration", "location", "onset" must only be present
    if explicitly stated in the user message. Omit them otherwise.
    All values must come from the user message only.
  agent: symptom_extractor

map_symptoms_to_symp_task:
  description: >
    You will receive a list of symptoms from the extract_symptoms_task output.
    Process ALL symptoms in a single pass. For each symptom:

    Step 1 - Search query authoring:
    Build a read-only SPARQL SELECT query yourself to search SYMP labels by the symptom text.
    Use this query shape (you may format whitespace freely):
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?symptom ?symptomLabel
      WHERE {
        ?symptom rdfs:label ?symptomLabel .
        FILTER(CONTAINS(LCASE(STR(?symptomLabel)), "<lowercased symptom text>"))
      }

    Step 2 - Execute:
    Call graphdb_symp_search with:
      {"sparql_query": "<full query string>"}
    Read candidate URIs, labels, and parsed IDs from the tool response.

    Step 3 - Select best candidate by semantic label relevance.
    If no relevant candidate is found, mark symptom as unmapped.

    Step 4 - Retry: If no match found, retry up to 2 times using a synonym or
    simplified version of the symptom text. If still no match, mark unmapped.

    Step 5 - Use parsed_symp_number from the selected candidate.
    If missing, parse only digits after SYMP_ from the selected URI.

    Step 6 - Repeat for the next symptom until all are processed.

    ABSOLUTE RULES:
    - You MUST call graphdb_symp_search for every symptom. Never skip tool calls.
    - matched_symp_uri and matched_symp_label MUST come from tool responses only.
    - NEVER invent, guess, or assume any SYMP URI, label, or numeric ID.
    - If tools return no results after all retries, set status "unmapped" and
      set matched_symp_uri, matched_symp_label, parsed_symp_number all to null.
    - An unmapped result with null values is always correct over any fabrication.

    STRICT graphdb_symp_search call rules:
    - Action input must be exactly one flat object: {"sparql_query": "<full query string>"}
    - Do not include extra keys.
    - If a call fails, retry up to 2 times after fixing your SPARQL query.
  expected_output: >
    A JSON object with key "symp_mappings" containing a list of objects.
    Each object must have these keys:
      "symptom": the symptom name string from the input
      "matched_symp_uri": the full URI string returned by graphdb_symp_search, or null if unmapped
      "matched_symp_label": the label string returned by graphdb_symp_search, or null if unmapped
      "parsed_symp_number": the digits-only string extracted from the URI, or null if unmapped
      "status": either "mapped" or "unmapped"
      "notes": empty string on success, brief failure reason on unmapped

    All non-null values in matched_symp_uri, matched_symp_label, and
    parsed_symp_number MUST come directly from tool responses.
    Do not invent or reuse any URI, label, or number from examples or memory.
  agent: symp_mapper

query_diseases_for_symptoms_task:
  description: >
    You will receive the symp_mappings list from the map_symptoms_to_symp_task output.

    For each entry in symp_mappings, follow EXACTLY one of these two cases:

    CASE A - status is "unmapped" OR parsed_symp_number is null or empty:
      Do NOT call any tool.
      Record this entry with disease_candidates set to [] and status "skipped".

    CASE B - status is "mapped" AND parsed_symp_number is a non-empty digit string:
      You MUST construct a read-only SPARQL SELECT query yourself.
      Use the parsed_symp_number from the mapping as the SYMP term in the query.

      Required query shape (you may format whitespace freely):
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX ro: <http://purl.obolibrary.org/obo/RO_>
      PREFIX symp: <http://purl.obolibrary.org/obo/SYMP_>
      SELECT ?disease ?diseaseLabel
      WHERE {
        ?disease rdfs:subClassOf ?restriction .
        ?restriction owl:onProperty ro:0002452 .
        ?restriction owl:someValuesFrom symp:<parsed_symp_number> .
        ?disease rdfs:label ?diseaseLabel .
        FILTER(LANG(?diseaseLabel) = "en")
      }

      Then call graphdb_sparql_query.
      The tool takes ONE argument named exactly "sparql_query".
      The value must be your full SPARQL query string.
      The Action Input must be a flat JSON object with exactly one key:
        {"sparql_query": "<full query string>"}
      Do NOT wrap in an array. Do NOT add other keys. One flat object only.

      The tool returns a JSON string. Parse it and read the "disease_candidates"
      array from the result. Copy every string from that array verbatim into
      this entry's disease_candidates. Do not modify any string.

      Also parse "disease_rows" from the same tool response. For each row,
      copy disease URI and label exactly as returned into disease_entries.
      Prefer row.disease_uri if present, otherwise row.disease_iri.

    ABSOLUTE RULES:
    - disease_candidates must contain ONLY strings from the tool response.
    - disease_entries must contain ONLY URI/label pairs from tool response rows.
    - NEVER invent, guess, infer, or paraphrase any disease name.
    - NEVER use symptom names as disease names.
    - NEVER copy disease names from examples, instructions, or memory.
    - If the tool returns an empty "disease_candidates" array, record []
      and set status "no_diseases". This is a correct and valid result.
    - If the tool call fails, retry up to 2 times after fixing your SPARQL query.
      After 2 failures record [] and status "tool_failure". Never fabricate.
    - An empty disease_candidates list is always correct over any fabrication.

    Process ALL entries before returning. Do not stop early.
  expected_output: >
    A JSON object with key "disease_results" containing a list of objects.
    Each object must have these keys:
      "symptom": the symptom name string from the mapping
      "symp_uri": the matched_symp_uri from the mapping, or null if skipped
      "parsed_symp_number": the parsed_symp_number from the mapping, or null if skipped
      "disease_candidates": list of disease label strings from graphdb_sparql_query,
                            or empty list [] if no diseases found, tool failed, or skipped
      "disease_entries": list of objects with keys:
             "disease_uri": full disease URI string from tool response, or null
             "disease_label": disease label string from tool response, or null
      "status": one of "success", "no_diseases", "tool_failure", "skipped"
      "notes": empty string on success, brief description of outcome otherwise

    CRITICAL: every string in disease_candidates must be copied verbatim from
    the "disease_candidates" array in the graphdb_sparql_query response.
    Do not write any disease name from memory, examples, or inference.
    Every disease_entries object must be copied from response rows only.
  agent: disease_mapper

rank_diagnoses_task:
  description: >
    You will receive the disease_results list from the query_diseases_for_symptoms_task output.

    Step 1 - Build co-occurrence index:
    For each disease label in any disease_candidates list, count how many
    distinct symptoms it appears under. This is its co-occurrence score.

    Step 2 - Rank:
    Sort diseases highest to lowest score. Break ties alphabetically.

    Step 3 - Assign confidence tiers:
      HIGH   — co_occurrence_score ≥ 60% of total_symptoms_processed
      MEDIUM — co_occurrence_score 30–59% of total_symptoms_processed
      LOW    — co_occurrence_score < 30% of total_symptoms_processed

    Step 4 - For each ranked disease, list the symptoms that support it.

    Step 5 - Return the differential diagnosis report.

    ABSOLUTE RULES:
    - Only include diseases that appear in disease_results disease_candidates lists.
    - NEVER add diseases from your own medical knowledge or memory.
    - NEVER invent or infer any disease not present in the input data.
    - If all disease_candidates lists are empty, return an empty
      differential_diagnosis list and explain in notes. Do not fabricate.
    - An empty diagnosis is always correct over a fabricated one.

    If no disease appears under more than one symptom, return all with LOW
    confidence and note low specificity.
  expected_output: >
    A JSON object with these keys:
      "differential_diagnosis": list of ranked disease objects, each with:
        "rank": integer starting from 1
        "disease": disease label string copied exactly from disease_results
        "co_occurrence_score": integer count of symptoms the disease appeared under
        "confidence": "HIGH", "MEDIUM", or "LOW"
        "supporting_symptoms": list of symptom name strings from disease_results
      "total_symptoms_processed": integer count of all symptoms received
      "total_diseases_found": integer count of unique disease labels across all results
      "unmapped_symptoms": list of symptom name strings with status "unmapped" or "skipped"
      "notes": brief summary string

    differential_diagnosis may be an empty list if no tool returned any diseases.
    Every disease string must be copied verbatim from the disease_candidates in
    the input. Do not write any disease name from memory or inference.
  agent: diagnosis_ranker

clarify_followup_symptoms_task:
  description: >
    You will receive disease_results and differential_diagnosis from prior tasks.

    ── TRIGGER RULE ──────────────────────────────────────────────────────────
    If total_diseases_found <= 1:
      Set followup_needed = false. Return empty disease_symptom_profiles and
      questions_asked arrays immediately. Do not call any tools.
    If total_diseases_found > 1:
      Follow-up is MANDATORY. Continue with the steps below.
    ──────────────────────────────────────────────────────────────────────────

    Step 1 - Select candidate diseases for profiling.
      Take all diseases with HIGH or MEDIUM confidence from differential_diagnosis.
      Also include any LOW-confidence diseases whose co_occurrence_score equals
      the highest co_occurrence_score present (ties at the top).
      Cap the candidate set at 5 diseases.

    Step 2 - Fetch symptom profiles.
      For each candidate disease, locate its disease_uri in disease_entries
      (from disease_results). If no URI is available, mark it skipped_for_followup.
      For every disease with a URI, call graphdb_disease_symptoms with:
        {"disease_uri": "<full URI>"}
      Collect the returned symptom labels into that disease's candidate_symptoms list.
      Do not fabricate symptom labels. Use tool output only.

    Step 3 - Build a global discriminative symptom pool.
      Collect every symptom label across all profiled diseases into one pool.
      Then apply these filters IN ORDER:
        a) Remove symptoms already present in the initial patient message
           (case-insensitive match against the original extracted symptom names).
        b) Remove symptoms that appear in ALL candidate disease profiles
           (they cannot discriminate between diseases).
        c) Score each remaining symptom by discriminative power:
             score = (number of candidate diseases that do NOT list this symptom)
             Higher score = more exclusive to fewer diseases = more discriminative.
        d) Break ties by preferring symptoms linked to higher-ranked diseases
           (lower rank number = higher priority).

    Step 4 - Select questions.
      Select an adaptive number of symptoms from highest discriminative score,
      asking as few questions as possible while still separating top diagnoses.
      Maximum allowed patient questions: 22.
      Before creating patient questions, classify each selected symptom as either:
      - patient_reportable (can be answered directly by the patient), or
      - investigation_required (needs vitals/labs/imaging/clinical measurement).

      Investigation-required examples:
      hypotension, hypertension, thrombocytopenia, low platelet count,
      leukopenia, anemia, elevated CRP, elevated liver enzymes, oxygen saturation,
      ECG/EKG findings, CT/MRI/X-ray findings, bradycardia, tachycardia,
      low heart rate, high heart rate, and blood-test-only abnormalities.

      For investigation_required items:
      - Do NOT create a patient yes/no question.
      - Add them to an `investigations_required` list with a short reason.

      For patient_reportable items only, create yes/no questions.
      For each selected symptom, emit exactly one yes/no question using this
      conditional style:
      - If the symptom is a common everyday term (e.g., fever, cough, headache),
        ask directly: "Do you have <symptom>?"
      - Treat these as common everyday terms and ask directly with no
        parentheses: fever, cough, headache, bleeding, vomiting, diarrhea,
        chest pain, sore throat, muscle pain, joint pain.
      - If the symptom is a medical/technical term (e.g., rash, dysuria,
        dyspnea), ask with a plain explanation plus the term in parentheses:
        "Do you have <simple explanation> (<medical term>)?"
        Example: "Do you have red spots on the skin (rash)?"
      
      If needed for grammar, a close equivalent is allowed, but it MUST remain
      a single yes/no question about exactly one symptom.
      Keep each question short (max 14 words), patient-friendly, and avoid
      medical jargon unless it is part of the symptom label.
      Do not ask severity, duration, or cause in the same question.
      IMPORTANT language policy:
      - Use easy, non-technical wording so any patient can understand.
      - Include parentheses only when the symptom label is medical/technical.
      - Common everyday symptom names should NOT be rewritten with parentheses.
      - Example common: "Do you have fever?"
      - Example common: "Do you have bleeding?"
      - Example medical: "Do you have yellow skin or eyes (jaundice)?"
      - The wording before parentheses MUST explain the symptom in plain words,
        not repeat the same medical label.
      - FORBIDDEN example: "Do you have rash (rash)?"
      - FORBIDDEN example: "Do you have bleeding (bleeding)?"
      - CORRECT example: "Do you have red or itchy skin spots (rash)?"
      Global deduplication: never emit the same symptom question twice.
      Skip any symptom that already has a non-empty patient_answer in the
      input context.

    ABSOLUTE RULES:
    - Call graphdb_disease_symptoms ONLY with URIs from disease_entries.
    - Never invent disease URIs, symptom URIs, or symptom labels.
    - Never ask about a symptom the patient already confirmed.
    - Never ask the patient about findings that require tests or measurements.
    - Any body parameter requiring measurement (heart rate, blood pressure,
      oxygen saturation, lab values, ECG/EKG, imaging) MUST be investigation_required.
    - Put test/measurement findings only in `investigations_required`.
    - Never produce or suggest a final diagnosis in this step.
    - questions_asked must contain no duplicate symptom entries.
    - Each question must end with "?" and be answerable by yes/no only.
    - Each question must reference exactly one symptom from candidate_symptoms.
    - For medical/technical symptoms, include the medical term in parentheses.
    - For common symptoms, do not add parentheses unless needed for clarity.
    - Never output "<term> (<term>)" for any symptom.
  expected_output: >
    A JSON object with keys:
      "followup_needed": boolean — true only when total_diseases_found > 1
      "disease_symptom_profiles": list of objects, one per candidate disease:
        "disease": disease label string (copied from differential_diagnosis)
        "disease_uri": disease URI string from disease_entries, or null
        "candidate_symptoms": list of symptom label strings from graphdb_disease_symptoms tool
        "status": one of "profiled" | "skipped_for_followup" | "tool_failure"
      "questions_asked": list of question objects, max 22:
        "symptom": the symptom label string used to generate the question
        "question": the yes/no question text to present to the patient
        "patient_answer": null  ← always null at output time; filled externally
      "investigations_required": list of objects:
        "finding": symptom/finding label that should not be asked directly
        "reason": brief reason, e.g. "requires measurement or laboratory/imaging investigation"
      "notes": brief summary — number of diseases profiled, symptoms in pool,
               questions selected, and any skipped diseases
  agent: followup_interviewer

refine_diagnosis_task:
  description: >
    You will receive the initial differential_diagnosis and the completed
    questions_asked list with patient_answer fields filled in by the patient,
    both provided as JSON blocks appended below this description by the runtime.
    Also available: the disease_symptom_profiles list (which disease has which
    candidate symptoms) from the follow-up payload.

    ── SCORING ALGORITHM ─────────────────────────────────────────────────────
    For every disease D in initial differential_diagnosis:
      baseline      = D.co_occurrence_score
      support_delta = 0
      conflict_delta = 0

      For each question Q in questions_asked:
        normalize answer = Q.patient_answer.strip().lower()

        If normalize answer is "yes" or starts with "yes":
          For each disease D whose candidate_symptoms list (in disease_symptom_profiles)
          contains Q.symptom (case-insensitive):
            support_delta += 1   (followup_support_count)

        If normalize answer is "no" or starts with "no":
          For each disease D whose candidate_symptoms list contains Q.symptom:
            conflict_delta += 1  (followup_conflict_count)

        Any other answer (blank, "unsure", "don't know", "maybe", etc.) → neutral, no change.

      final_score[D] = baseline + support_delta - conflict_delta

    ── RE-RANKING ────────────────────────────────────────────────────────────
    Sort diseases by final_score descending. Break ties alphabetically.
    Renumber ranks starting from 1.

    ── CONFIDENCE ASSIGNMENT ─────────────────────────────────────────────────
    Let top_score = final_score of rank-1 disease,
        second_score = final_score of rank-2 disease (or 0 if only one disease).

    Rank-1 disease:
      HIGH   if top_score ≥ 2 × second_score, or only one disease remains
      MEDIUM if top_score < 2 × second_score but top_score > second_score
      LOW    if top_score == second_score (still tied after evidence)

    All other diseases:
      MEDIUM if their final_score > 0
      LOW    otherwise

    ── TRANSPARENCY ──────────────────────────────────────────────────────────
    For each disease in the output, reasoning must explicitly state:
      - Which follow-up symptoms were confirmed (yes answers) for this disease
      - Which follow-up symptoms were denied (no answers) for this disease
      - How the evidence shifted (or did not shift) its rank vs. baseline
    followup_summary must name the single most impactful answer and why.
    If ALL patient answers were neutral, set notes to:
      "All follow-up answers were neutral; ranking unchanged from baseline."

    ABSOLUTE RULES:
    - Only diseases present in initial differential_diagnosis may appear in output.
    - Never invent new diseases or symptoms.
    - Use follow-up answers as the ONLY post-baseline evidence source.
    - An unchanged ranking with an honest explanation is always correct.
  expected_output: >
    A JSON object with keys:
      "refined_differential_diagnosis": list of ranked disease objects:
        "rank": integer starting at 1
        "disease": disease label copied exactly from initial ranking
        "baseline_score": integer — original co_occurrence_score
        "followup_support_count": integer — number of confirmed follow-up symptoms
        "followup_conflict_count": integer — number of denied follow-up symptoms
        "final_score": integer — baseline + support - conflict
        "updated_confidence": "HIGH" | "MEDIUM" | "LOW"
        "reasoning": string — explicit evidence narrative for this disease
      "followup_summary": string — most impactful answer and overall effect on ranking
      "notes": string — caveats, e.g. neutral-only answers, ties, missing URIs
  agent: diagnosis_refiner